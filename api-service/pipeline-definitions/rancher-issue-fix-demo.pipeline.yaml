name: Rancher Issue Fix & Demo
description: Reproduce a rancher/dashboard issue, demonstrate it (screenshot or video), fix it, verify the fix against the original demonstration, ensure tests, record a fixed demonstration, then commit and open a PR.
args:
  - name: ISSUE_URL
    required: true
    description: URL of the GitHub issue to target (e.g. `https://github.com/rancher/dashboard/issues/12345`).
stages:
  - name: Reproduce Issue
    skill: rancher-issue-reproduce
    successCriteria: The reported bug is reliably reproduced against the live Rancher instance and the trigger steps are documented.
    next:
      - Decide Demonstration
    description: Reproduce the issue against the project's Rancher instance and document the exact trigger steps.
  - name: Decide Demonstration
    skill: rancher-demo-decide
    successCriteria: A medium (screenshot or video) is chosen and written to demo-medium.txt with a rationale.
    next:
      - Record Screenshot
      - Record Video
    description: Decide whether a screenshot or a video best demonstrates the reproduction. Forks to both recorders; only the chosen medium produces output.
  - name: Record Screenshot
    skill: rancher-screenshot-record
    successCriteria: A before-fix screenshot is captured when screenshot was selected (no-op otherwise).
    next:
      - Create Fix
    description: Capture a screenshot of the reproduction when that medium was chosen.
  - name: Record Video
    skill: rancher-video-record
    successCriteria: A before-fix video is recorded when video was selected (no-op otherwise).
    next:
      - Create Fix
    description: Record a video of the reproduction when that medium was chosen.
  - name: Create Fix
    skill: rancher-fix-create
    successCriteria: A focused code change addressing the root cause is implemented in the dashboard workspace.
    next:
      - Verify Fix
    description: Implement the fix for the reproduced issue. Joins the screenshot and video branches.
  - name: Verify Fix
    skill: rancher-fix-verify
    successCriteria: Replaying the original demonstration shows the bug is gone and behavior matches expectations.
    next:
      - Ensure Tests
    description: Verify the fix resolves the issue using the original reproduction.
  - name: Ensure Tests
    skill: rancher-tests-ensure
    successCriteria: A regression test covering the fix is added or updated and the relevant suite passes.
    next:
      - Record Fixed Demonstration
    description: Ensure appropriate automated tests cover the fix.
  - name: Record Fixed Demonstration
    skill: rancher-demo-record
    successCriteria: An after-fix screenshot or video (same medium as before) clearly shows the issue resolved.
    next:
      - Create Commit
    description: Record the post-fix demonstration highlighting that the issue is fixed.
  - name: Create Commit
    skill: rancher-commit-create
    successCriteria: A concise, convention-following commit on branch issue-NNNNN containing the fix and tests.
    next:
      - Create PR
    description: Commit the change following project conventions.
  - name: Create PR
    skill: rancher-pr-create
    successCriteria: A draft PR is opened upstream with the before/after demonstration embedded inline.
    description: Open a draft pull request upstream to rancher/dashboard.
