services:
  bender:
    build:
      context: .
      dockerfile: harness/Dockerfile
    # All configurable keys are injected from .env (see .env.example).
    env_file:
      - .env
    privileged: true
    ports:
      - "8009:80"
      - "4444:443"
      - "6007:6006"
    volumes:
      # 1. Persistent bender state — the single data volume. Everything the app
      #    creates lives here: pipelines/, credentials/, config/ (definitions
      #    repo), cli/, browser-profile/, rancher-data/, … Override the host base
      #    dir with BENDER_DIR (defaults to ~/bender).
      - ${BENDER_DIR:-~/bender}:/data

      # 2. Inner Docker engine storage (images/layers/containers). A named volume
      #    on purpose — DinD wants a real docker-managed volume, not a host
      #    bind-mount (overlay2 misbehaves on bind-mounts and it's large/churny).
      - bender-dind:/var/lib/docker

      # 3. Dev overlay: the repo's templates, layered on top of /data so template
      #    edits are live without an image rebuild. (Remove this and templates
      #    come from the baked image instead.)
      - ./api-service/templates:/data/templates
    restart: unless-stopped

volumes:
  bender-dind:
