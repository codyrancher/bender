services:
  bender:
    build:
      context: .
      dockerfile: harness/Dockerfile
    # All configurable keys are injected from .env (see .env.example).
    env_file:
      - .env
    privileged: true
    ports:
      - "8009:80"
      - "4444:443"
      - "6007:6006"
    volumes:
      - bender-dind:/var/lib/docker
      # All bender state lives under ~/bender (override the base with BENDER_DIR):
      # pipelines/, credentials/, config/, cli/, browser-profile/, etc.
      - ${BENDER_DIR:-~/bender}:/data
      # Repo templates, layered on top of /data so edits are live in dev:
      - ./api-service/templates:/data/templates
      - /dev/snd:/dev/snd
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped

volumes:
  bender-dind:
