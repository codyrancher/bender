<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="prompt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b85898"/>
      <stop offset="100%" stop-color="#e08878"/>
    </linearGradient>
    <linearGradient id="cursor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0d8d0"/>
      <stop offset="100%" stop-color="#e0a898"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#6a2858"/>

  <!-- Terminal prompt > -->
  <path d="M8 10 L15 16 L8 22" stroke="url(#prompt)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor underscore _ -->
  <line x1="18" y1="22" x2="25" y2="22" stroke="url(#cursor)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
