<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .add-btn {
      background: #3a3a5c;
      color: #b0b0d0;
      border: 1px solid #4a4a6c;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .add-btn:hover { background: #4a4a6c; color: #fff; }

    .rules { display: flex; flex-direction: column; gap: 8px; }

    .rule {
      background: #252540;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      padding: 10px;
      position: relative;
      cursor: grab;
    }
    .rule.dragging { opacity: 0.4; }
    .rule.drag-over { border-color: #7070ff; }

    .rule-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .rule-name {
      flex: 1;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 3px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 2px 4px;
      font-family: inherit;
    }
    .rule-name:hover { border-color: #3a3a5c; }
    .rule-name:focus { border-color: #7070ff; outline: none; background: #1a1a2e; }

    .color-select {
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 3px;
      color: #e0e0e0;
      padding: 2px 4px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }

    .toggle {
      width: 32px;
      height: 18px;
      background: #3a3a5c;
      border-radius: 9px;
      position: relative;
      cursor: pointer;
      border: none;
      flex-shrink: 0;
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #888;
      border-radius: 50%;
      transition: all 0.15s;
    }
    .toggle.on { background: #4a6aff; }
    .toggle.on::after { left: 16px; background: #fff; }

    .delete-rule {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      line-height: 1;
    }
    .delete-rule:hover { color: #e55; }

    .patterns {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .pattern-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .pattern-input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #3a3a5c;
      border-radius: 3px;
      color: #b0d0b0;
      font-family: monospace;
      font-size: 12px;
      padding: 4px 6px;
    }
    .pattern-input:focus { border-color: #7070ff; outline: none; }
    .pattern-input.invalid { border-color: #e55; }

    .pattern-remove {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
    }
    .pattern-remove:hover { color: #e55; }

    .add-pattern {
      background: none;
      border: none;
      color: #5070b0;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 0;
      text-align: left;
      font-family: inherit;
    }
    .add-pattern:hover { color: #7090d0; }

    .drag-handle {
      cursor: grab;
      color: #555;
      font-size: 14px;
      user-select: none;
      padding: 0 2px;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .actions button {
      background: #3a3a5c;
      color: #b0b0d0;
      border: 1px solid #4a4a6c;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .actions button:hover { background: #4a4a6c; color: #fff; }

    .status {
      margin-top: 8px;
      font-size: 11px;
      color: #6a8;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>
    Tab Groups
    <button class="add-btn" id="add-rule">+ Add Rule</button>
  </h1>
  <div class="rules" id="rules"></div>
  <div class="actions">
    <button id="export-btn">Export</button>
    <button id="import-btn">Import</button>
  </div>
  <div class="status" id="status"></div>
  <input type="file" id="import-file" accept=".json" style="display:none">
  <script src="popup.js"></script>
</body>
</html>
