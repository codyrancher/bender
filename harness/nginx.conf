map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# HTTP server - serves portal and proxies API + per-pipeline dev servers
server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;


    location ^~ /api/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dev server with specific port: /d/{project}/{port}/path...
    location ~ ^/d/([^/]+)/(\d+)(/.*)?$ {
        set $project $1;
        set $port $2;
        set $subpath $3;
        set $upstream http://$project:$port;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Dev server default port (3000): /d/{project}/path...
    location ~ ^/d/([^/]+)(/.*)?$ {
        set $project $1;
        set $subpath $2;
        set $upstream http://$project:3000;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Dev environment routes (only resolve when dev containers are running) ---

    # Dev API proxy
    location ^~ /dev/api/ {
        set $dev_api http://api-dev:8080;
        rewrite ^/dev(/api/.*)$ $1 break;
        proxy_pass $dev_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dev server with specific port: /dev/d/{project}/{port}/path...
    location ~ ^/dev/d/([^/]+)/(\d+)(/.*)?$ {
        set $project $1;
        set $port $2;
        set $subpath $3;
        set $upstream http://$project:$port;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Dev server default port: /dev/d/{project}/path...
    location ~ ^/dev/d/([^/]+)(/.*)?$ {
        set $project $1;
        set $subpath $2;
        set $upstream http://$project:3000;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Dev portal - proxy to Vite dev server (HMR)
    location /dev/ {
        set $portal_dev http://portal-dev:5173;
        proxy_pass $portal_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /usr/share/nginx/html;
    index index.html;

    sendfile off;
    etag off;
    if_modified_since off;
    add_header Cache-Control "no-store, no-cache, must-revalidate";

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;


