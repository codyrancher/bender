map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# HTTP server - serves portal and proxies API/VSCode
server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Namespace browser storage per VS Code project instance
    sub_filter '</head>' '<script>!function(){var m=location.pathname.match(/\/c\/([^\/]+)/);if(!m)return;var proj=m[1],ns=proj+"::";var O=indexedDB.open.bind(indexedDB);indexedDB.open=function(n,v){return O(ns+n,v)};var D=indexedDB.deleteDatabase.bind(indexedDB);indexedDB.deleteDatabase=function(n){return D(ns+n)};function wrapStorage(s){var g=s.getItem.bind(s),t=s.setItem.bind(s),r=s.removeItem.bind(s),k=s.key.bind(s);function nk(){for(var i=0,n=0;i<s.length;i++){if(k(i).indexOf(ns)===0)n++}return n}return{getItem:function(x){return g(ns+x)},setItem:function(x,v){return t(ns+x,v)},removeItem:function(x){return r(ns+x)},key:function(i){for(var j=0,n=0;j<s.length;j++){var x=k(j);if(x.indexOf(ns)===0){if(n===i)return x.slice(ns.length);n++}}return null},clear:function(){for(var i=s.length-1;i>=0;i--){var x=k(i);if(x.indexOf(ns)===0)r(x)}},get length(){return nk()}}}var ls=window.localStorage,ss=window.sessionStorage;try{Object.defineProperty(window,"localStorage",{get:function(){return wrapStorage(ls)},configurable:true})}catch(e){}try{Object.defineProperty(window,"sessionStorage",{get:function(){return wrapStorage(ss)},configurable:true})}catch(e){}var idb="var ns=\""+ns+"\";var O=indexedDB.open.bind(indexedDB);indexedDB.open=function(n,v){return O(ns+n,v)};var D=indexedDB.deleteDatabase.bind(indexedDB);indexedDB.deleteDatabase=function(n){return D(ns+n)};";var OW=Worker;Worker=function(u,o){try{var a=new URL(u,location.href).href;var c=o&&o.type==="module"?idb+"import \""+a+"\"":idb+"importScripts(\""+a+"\")";return new OW(URL.createObjectURL(new Blob([c],{type:"application/javascript"})),o)}catch(e){return new OW(u,o)}};var wo=window.open;window.open=function(url,t,f){try{if(url&&parent!==window){var u=new URL(url,location.origin);if(u.protocol==="http:"||u.protocol==="https:"){var loc=u.hostname==="localhost"||u.hostname==="127.0.0.1";parent.postMessage({type:"open-url",project:proj,url:url,isLocal:loc,port:loc?u.port||"80":"",path:loc?u.pathname+u.search+u.hash:""},"*");return null}}}catch(e){}return wo.call(window,url,t,f)}}()</script></head>';
    sub_filter_once on;

    location ^~ /api/ {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ws-scrcpy WebSocket: proxy root WebSocket upgrades to ws-scrcpy
    # (ws-scrcpy client connects to wss://host/?action=... without path prefix)
    location @ws_scrcpy {
        set $ws_scrcpy http://bender-ws-scrcpy:8000;
        proxy_pass $ws_scrcpy;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # VSCode: /c/{project}... - allow HTTP for local dev proxy
    location ~ ^/c/([^/]+)(.*)$ {
        set $project $1;
        set $subpath $2;
        set $upstream http://$project:9000;
        proxy_pass $upstream/c/$project$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400;
    }

    # ws-scrcpy: rewrite links to stay inside the iframe and force reload on hash nav
    location ~ ^/d/bender-ws-scrcpy/8000(/.*)?$ {
        set $subpath $1;
        set $upstream http://bender-ws-scrcpy:8000;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/javascript text/javascript text/html;
        sub_filter_once off;
        sub_filter '"href","".concat(a,"//").concat(n,":").concat(o).concat(s).concat(c))' '"href","".concat(location.pathname).concat(c))';
        sub_filter '"target","_blank"' '"target","_self"';
        sub_filter '</head>' '<script>document.addEventListener("click",function(e){var a=e.target.closest("a");if(!a)return;var h=a.getAttribute("href");if(h&&h.indexOf("#!")!==-1){e.preventDefault();var u=new URL(h,location.href);location.hash=u.hash;location.reload()}});</script></head>';
    }

    # Dev server with specific port: /d/{project}/{port}/path...
    location ~ ^/d/([^/]+)/(\d+)(/.*)?$ {
        set $project $1;
        set $port $2;
        set $subpath $3;
        set $upstream http://$project:$port;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Dev server default port (3000): /d/{project}/path...
    location ~ ^/d/([^/]+)(/.*)?$ {
        set $project $1;
        set $subpath $2;
        set $upstream http://$project:3000;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Dev environment routes (only resolve when dev containers are running) ---

    # Dev API proxy
    location ^~ /dev/api/ {
        set $dev_api http://api-dev:8080;
        rewrite ^/dev(/api/.*)$ $1 break;
        proxy_pass $dev_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Dev VSCode: /dev/c/{project}...
    location ~ ^/dev/c/([^/]+)(.*)$ {
        set $project $1;
        set $subpath $2;
        set $upstream http://$project:9000;
        proxy_pass $upstream/c/$project$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400;
    }

    # Dev server with specific port: /dev/d/{project}/{port}/path...
    location ~ ^/dev/d/([^/]+)/(\d+)(/.*)?$ {
        set $project $1;
        set $port $2;
        set $subpath $3;
        set $upstream http://$project:$port;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Dev server default port: /dev/d/{project}/path...
    location ~ ^/dev/d/([^/]+)(/.*)?$ {
        set $project $1;
        set $subpath $2;
        set $upstream http://$project:3000;
        proxy_pass $upstream$subpath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Dev portal - proxy to Vite dev server (HMR)
    location /dev/ {
        set $portal_dev http://portal-dev:5173;
        proxy_pass $portal_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /usr/share/nginx/html;
    index index.html;

    sendfile off;
    etag off;
    if_modified_since off;
    add_header Cache-Control "no-store, no-cache, must-revalidate";

    location / {
        error_page 418 = @ws_scrcpy;
        if ($http_upgrade = "websocket") { return 418; }
        try_files $uri $uri/ /index.html;
    }
}

