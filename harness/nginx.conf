        sub_filter '</head>' '<script>document.addEventListener("click",function(e){var a=e.target.closest("a");if(!a)return;var h=a.getAttribute("href");if(h&&h.indexOf("#!")!==-1){e.preventDefault();var u=new URL(h,location.href);location.hash=u.hash;location.reload()}});</script></head>';
    }

    # Dev server with specific port: /d/{project}/{port}/path...
